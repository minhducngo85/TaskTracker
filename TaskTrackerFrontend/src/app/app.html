<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <h2>🚀 Menu</h2>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active" (click)="toggleSidebar()">📉 Dashboard</a>
      <a routerLink="/tasks" (click)="toggleSidebar()">📋 Tasks</a>
      <a *ngIf="auth.isAdmin()" routerLink="/admin" (click)="toggleSidebar()">🛠️ Admin</a>
      <a routerLink="/login" (click)="toggleSidebar()">🔐 Login</a>
    </nav>
  </aside>

  <!-- Overlay (mobile) -->
  <div 
    class="overlay" 
    *ngIf="isSidebarOpen"
    (click)="toggleSidebar()">
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <header class="header">
      <button class="menu-btn" (click)="toggleSidebar()">☰</button>
      <h2>Task Tracker - Mini Jira</h2>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </header>

    <!-- Content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
