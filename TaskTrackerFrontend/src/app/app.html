<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>🚀 Menu</h2>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">📉 Dashboard</a>
      <a routerLink="/tasks" >📋 Tasks</a>
      <!-- 🔥 chỉ admin thấy -->
      <a *ngIf="auth.isAdmin()" routerLink="/admin"> 🛠️ Admin</a>
      <a routerLink="/login">🔐 Login</a>
    </nav>
  </aside>

  <!-- Main content -->
  <div class="main">
    <!-- Header -->
    <header class="header">
      <h2>Task Tracker - Mini Jira</h2>
      <button (click)="logout()">Logout</button>
    </header>

    <!-- Page content -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
