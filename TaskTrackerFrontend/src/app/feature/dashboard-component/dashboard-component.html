<h2 class="title">📉 Dashboard</h2>

<div class="dashboard" *ngIf="stats$ | async as stats">
  <!-- 🔢 Summary Cards -->
  <div class="cards">
    <div class="card total">
      <div class="card-title">Total Tasks</div>
      <div class="card-value">{{ stats.total }}</div>
    </div>

    <div class="card todo">
      <div class="card-title">TODO</div>
      <div class="card-value">{{ stats.todo }}</div>
    </div>

    <div class="card progress">
      <div class="card-title">IN PROGRESS</div>
      <div class="card-value">{{ stats.inProgress }}</div>
    </div>

    <div class="card done">
      <div class="card-title">DONE</div>
      <div class="card-value">{{ stats.done }}</div>
    </div>
  </div>

  <div class="row-2col">
    <!--Left-->
    <div>
      <!--Prgress bar-->
      <div class="section">
        <div class="section-title">Progress Overview</div>

        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="stats.completionPercent"></div>
          </div>

          <div class="progress-text">{{ stats.completionPercent }}% Completed</div>
        </div>
      </div>

      <div>
        <div class="section">
        <div class="section-title">Recent Tasks</div>

        <div class="task-item" *ngFor="let task of recentTasks$ | async">

      <div class="task-left">
        <span 
          class="material-icons priority-icon"
          [ngClass]="'priority-' + task.priority.toLowerCase()"
          [attr.title]="task.priority">
          flag
        </span>

        <span class="task-title">{{ task.title }}</span>
      </div>

      <div class="task-right">
        <span class="status" [ngClass]="task.status">{{ task.status }}</span>
      </div>

    </div>
        </div>
      </div>
    </div>

 

    <!-- right-->
    <div>
      <!-- 🎯 Priority Overview -->
      <div class="section">
        <div class="section-title">Priority Overview</div>
        <canvas #chartCanvas></canvas>
      </div>
    </div>
  </div>
</div>
