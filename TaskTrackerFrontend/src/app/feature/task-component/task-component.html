<h2 class="title">📋 Task List</h2>

<!-- Add button -->
<button class="add-btn" (click)="toggleForm()">+ Add Task</button>

<!-- Form add task -->
<!-- Form -->
<div class="border-box" *ngIf="showForm">
  <div class="border-title">+ Add new Task</div>

  <div class="border-content">
    <form *ngIf="showForm" #taskForm="ngForm" (ngSubmit)="addTask(taskForm)" class="task-form">
      <!-- Title -->
      <input
        type="text"
        name="title"
        [(ngModel)]="newTask.title"
        placeholder="Title"
        required
        minlength="3"
        #title="ngModel"
      />
      <div class="error" *ngIf="title.invalid && title.touched">
        <small *ngIf="title.errors?.['required']">Title is required</small>
        <small *ngIf="title.errors?.['minlength']">Min 3 characters</small>
      </div>
      <br />
      <!-- Description -->
      <input
        type="text"
        name="description"
        [(ngModel)]="newTask.description"
        placeholder="Description"
        required
        #desc="ngModel"
      />
      <div class="error" *ngIf="desc.invalid && desc.touched">
        <small>Description is required</small>
      </div>

      <br />
      <!-- Status -->
      <select name="status" [(ngModel)]="newTask.status">
        <option value="TODO">TODO</option>
        <option value="IN_PROGRESS">IN_PROGRESS</option>
        <option value="DONE">DONE</option>
      </select>

      <!-- Priority -->
      <select name="priority" [(ngModel)]="newTask.priority">
        <option *ngFor="let p of priorityOptions" [value]="p">
          {{ getPriorityEmoji(p) }} {{ p }}
        </option>
      </select>

      <!-- Assigned to -->
      <input
        type="text"
        name="assignedTo"
        [(ngModel)]="newTask.assignedTo"
        placeholder="Assigned to"
        required
        #assignedTo="ngModel"
      />
      <div class="error" *ngIf="assignedTo.invalid && assignedTo.touched">
        <small>AssignedTo is required</small>
      </div>
      <br />
      <!-- Buttons -->
      <div class="form-actions">
        <button class="save-btn" type="submit" [disabled]="taskForm.invalid">Save</button>
        <span style="padding: 5px"></span>
        <button class="cancel-btn" type="button" (click)="toggleForm()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div class="border-box">
  <div class="border-title">Filter & Sort</div>

  <div class="border-content">
    <div class="filter-bar">
      <!-- Status filter-->
      <select [(ngModel)]="filterValue" (change)="applyFilter()">
        <option value="">Status All</option>
        <option value="TODO">TODO</option>
        <option value="IN_PROGRESS">IN_PROGRESS</option>
        <option value="DONE">DONE</option>
      </select>

      <!-- Priority Filter -->
      <select [(ngModel)]="filterPriorityValue" (change)="applyFilter()">
        <option value="">Priority All</option>
        <option *ngFor="let p of priorityOptions" [value]="p">
          {{ getPriorityEmoji(p) }} {{ p }}
        </option>
      </select>

      <!-- Search by name-->
      <input
        type="text"
        [(ngModel)]="searchValue"
        (change)="applyFilter()"
        placeholder="Search by title..."
      />

      <!-- Sorting-->
      <select [(ngModel)]="sortValue" (change)="applyFilter()">
        <option value="">Sort (Default)</option>
        <option value="asc">Title A-Z</option>
        <option value="desc">Title Z-A</option>
      </select>

      <button (click)="clearFilter()" class="clear-btn">❌ Clear</button>
    </div>
  </div>
</div>

<div style="margin-bottom: 10px"></div>
<div class="task-grid">
  <div class="task-card" *ngFor="let task of tasks$ | async">
    <div>
      <span class="status" [ngClass]="task.status">
        {{ task.status }}
      </span>
      <span class="title" style="margin-left: 5px">{{ task.title }}</span>

      <span
        style="margin-left: 5px"
        class="material-icons priority-icon"
        [ngClass]="'priority-' + task.priority.toLowerCase()"
        [attr.title]="task.priority"
      >
        flag
      </span>
    </div>
    <p style="margin-top: 5px">📃 {{ task.description }}</p>
    <p>🐨 {{ task.assignedTo }}</p>

    <!--Actions-->
    <div class="actions">
      <button class="edit-btn" (click)="startEdit(task)">📝</button>
      <button class="delete-btn" (click)="deleteTask(task.id)">🗑️</button>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-backdrop" *ngIf="editingTask">
    <div class="modal">
      <h2><b>Edit Task</b></h2>
      <hr style="margin-bottom: 10px" />
      <div class="form-group">
        <label>Title</label>
        <input [(ngModel)]="editingTask.title" placeholder="Title" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea
          [(ngModel)]="editingTask.description"
          placeholder="Description"
          rows="5"
        ></textarea>
      </div>

      <div class="form-group">
        <label>Assignee</label>
        <input [(ngModel)]="editingTask.assignedTo" placeholder="Assignee" />
      </div>

      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="editingTask.status">
          <option value="TODO">TODO</option>
          <option value="IN_PROGRESS">IN_PROGRESS</option>
          <option value="DONE">DONE</option>
        </select>
      </div>

      <!-- Priority -->
      <div class="form-group">
        <label>Priority</label>
        <select name="priority" [(ngModel)]="editingTask.priority">
          <option *ngFor="let p of priorityOptions" [value]="p">
            {{ getPriorityEmoji(p) }} {{ p }}
          </option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="save-btn" (click)="saveEdit()">💾 Save</button>
        <button class="cancel-btn" (click)="cancelEdit()">❌ Cancel</button>
      </div>
    </div>
  </div>
</div>
